<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherUp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<script>
// 🌧️ Function to generate raindrops
function makeItRain() {
    const container = document.getElementById("rain-container");
    container.innerHTML = ""; 

    for (let i = 0; i < 100; i++) {
        const drop = document.createElement("div");
        drop.classList.add("drop");
        drop.style.left = Math.random() * 100 + "vw";
        drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + "s"; 
        drop.style.animationDelay = Math.random() * 2 + "s";
        container.appendChild(drop);
    }
}

// ❄️ Function to generate snowflakes
function makeItSnow() {
    const container = document.getElementById("rain-container");
    container.innerHTML = ""; 

    // Creating 50 snowflakes (snow is usually less dense than rain)
    for (let i = 0; i < 50; i++) {
        const flake = document.createElement("div");
        flake.classList.add("snowflake");
        
        // Randomize position, size, falling speed, and sway speed
        flake.style.left = Math.random() * 100 + "vw";
        
        const size = Math.random() * 6 + 4; // Size between 4px and 10px
        flake.style.width = size + "px";
        flake.style.height = size + "px";
        flake.style.opacity = Math.random() * 0.6 + 0.4;
        
        // Randomize the animation durations and delays separately
        const fallDuration = Math.random() * 3 + 3; // 3s to 6s
        const swayDuration = Math.random() * 2 + 1; // 1s to 3s
        flake.style.animationDuration = `${fallDuration}s, ${swayDuration}s`;
        flake.style.animationDelay = `${Math.random() * 5}s, ${Math.random() * 2}s`;
        
        container.appendChild(flake);
    }
}

// ☀️ Function to clear all weather effects
function stopWeatherEffects() {
    document.getElementById("rain-container").innerHTML = "";
}

async function getWeather() {
    const city = document.getElementById("city").value;
    const apiKey = "1fdf223d6f678e146e1641f2a72c60c8";

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

    const response = await fetch(url);
    const data = await response.json();

    if (data.cod !== 200) {
        alert("City not found!");
        return;
    }

    // ✅ Update UI
    document.getElementById("cityName").innerText = data.name;
    document.getElementById("temp").innerText = Math.round(data.main.temp) + "°C";
    document.getElementById("desc").innerText = data.weather[0].description;
    document.getElementById("humidity").innerText = "Humidity: " + data.main.humidity + "%";

    const iconCode = data.weather[0].icon; 

    // 🌤️ Icon
    const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
    document.getElementById("weatherIcon").src = iconUrl;

    // 🌈 Background & Weather Effects
    const weatherMain = data.weather[0].main.toLowerCase();

    document.body.className = "";
    stopWeatherEffects(); // Clear previous rain or snow first

    if (weatherMain.includes("clear")) {
        document.body.classList.add("clear");
    } 
    else if (weatherMain.includes("cloud")) {
        document.body.classList.add("clouds");
    } 
    else if (weatherMain.includes("rain") || weatherMain.includes("drizzle")) {
        document.body.classList.add("rain");
        makeItRain(); // 🌧️ Trigger rain
    }
    else if (weatherMain.includes("snow")) {
        document.body.classList.add("snow");
        makeItSnow(); // ❄️ Trigger snow
    }

    // 🌙 Night
    if (iconCode.includes("n")) {
        document.body.classList.add("night");
    }
    else if (weatherMain.includes("smoke") || 
             weatherMain.includes("haze") || 
             weatherMain.includes("mist")) {
        document.body.classList.add("clouds");
    }
}
</script>
<body>
    <div id="rain-container" class="rain-container"></div>
    <div class="weather-widget">
        <div class="header">
            <i class="ph ph-cloud-sun"></i>
            <h1>Weather</h1>
        </div>
        
        <div class="search-container">
            <div class="input-wrapper">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="city" placeholder="Search city">
            </div>
            <button onclick="getWeather()">Get Weather</button>
        </div>
        
        <div class="weather-display fade-in">
            <div id="cityName" class="city-name">San Francisco</div>
            <img id="weatherIcon" width="100">
            <div id="temp" class="temperature">72°</div>
            <div class="condition">
                <i class="ph ph-cloud"></i>
                <span id="desc" class="description">Mostly Cloudy</span>
            </div>
            <div class="humidity-container">
                <i class="ph ph-drop"></i>
                <span id="humidity">45%</span>
            </div>
        </div>
    </div>
</body>
</html>
